<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fork.Web</title>
  <style>
    :root {
      --p1: #3af;
      --p1-bg: #16263a;
      --p1-fill: #1d3a52;
      --p2: #f54;
      --p2-bg: #3a1a16;
      --p2-fill: #52201d;
      --done: #4c4;
    }
    body {
      margin: 0;
      background: #111;
      color: #ddd;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      gap: 16px;
      box-sizing: border-box;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-radius: 8px;
      background: #1a1a22;
      border: 2px solid var(--p1);
      font-weight: 600;
      font-size: 16px;
      width: 100%;
      max-width: 480px;
      box-sizing: border-box;
      justify-content: space-between;
    }
    .status.p2 { border-color: var(--p2); }
    .status.done { border-color: var(--done); }
    .status .swatch {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--p1);
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    .status.p2 .swatch { background: var(--p2); }
    .status.done .swatch { background: var(--done); }
    .status .tally {
      font-size: 13px;
      color: #aaa;
      font-weight: 400;
    }
    .status .tally .p1-tally { color: var(--p1); }
    .status .tally .p2-tally { color: var(--p2); }

    /* Cards (drafting view) */
    .move-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(5, auto);
      gap: 12px;
      width: 100%;
      max-width: 480px;
    }
    body[data-phase="placing"] .move-cards,
    body[data-phase="done"] .move-cards { display: none; }

    .card {
      background: #1a1a22;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      user-select: none;
      aspect-ratio: 1 / 1.15;
      transition: border-color 0.15s, background 0.15s;
    }
    .card:not(.p1):not(.p2):hover { border-color: #6cf; }
    .card.p1 {
      border-color: var(--p1);
      background: var(--p1-bg);
      cursor: default;
    }
    .card.p2 {
      border-color: var(--p2);
      background: var(--p2-bg);
      cursor: default;
    }
    .card.p1 polygon.knight { fill: var(--p1-fill); stroke: var(--p1); }
    .card.p2 polygon.knight { fill: var(--p2-fill); stroke: var(--p2); }
    .card.p1 polygon.center { fill: var(--p1-fill); stroke: var(--p1); }
    .card.p2 polygon.center { fill: var(--p2-fill); stroke: var(--p2); }
    .card.p1 circle.marker { fill: var(--p1); stroke: #cef; }
    .card.p2 circle.marker { fill: var(--p2); stroke: #fce; }
    .card svg {
      width: 100%;
      flex: 1;
      min-height: 0;
      display: block;
    }
    .card .label {
      font-size: 13px;
      color: #aaa;
      font-variant-numeric: tabular-nums;
    }
    .card.p1 .label { color: var(--p1); }
    .card.p2 .label { color: var(--p2); }

    /* Board view */
    .board-wrap {
      display: none;
      width: 70%;
    }
    body[data-phase="placing"] .board-wrap,
    body[data-phase="done"] .board-wrap { display: block; }
    #board {
      width: 100%;
      height: auto;
      display: block;
    }
    .cell {
      fill: #1a1a22;
      stroke: #333;
      stroke-width: 0.3;
    }
    .cell.available.p1-target {
      fill: var(--p1-bg);
      stroke: var(--p1);
      stroke-width: 0.8;
      cursor: pointer;
    }
    .cell.available.p2-target {
      fill: var(--p2-bg);
      stroke: var(--p2);
      stroke-width: 0.8;
      cursor: pointer;
    }
    .cell.available:hover { filter: brightness(1.4); }
    .placement-marker { stroke-width: 0.8; }
    .placement-marker.p1 { fill: var(--p1); stroke: #cef; }
    .placement-marker.p2 { fill: var(--p2); stroke: #fce; }
    .placement-label {
      fill: white;
      font-family: system-ui, sans-serif;
      font-weight: 600;
      pointer-events: none;
    }

    /* Card mini-svg cell styling */
    polygon {
      fill: #2a2a3a;
      stroke: #6cf;
      stroke-width: 0.5;
    }
    polygon.knight {
      fill: #5a3a2a;
      stroke: #f96;
    }
    polygon.center {
      fill: #3a2a4a;
      stroke: #fc6;
    }
    circle.marker {
      fill: #f60;
      stroke: #fc6;
      stroke-width: 1;
    }
  </style>
</head>
<body data-phase="drafting">
  <div class="move-cards" id="cards"></div>
  <div class="board-wrap" id="board-wrap">
    <svg id="board" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <script>
    const SVG_NS = 'http://www.w3.org/2000/svg';

    function hexPoints(cx, cy, size) {
      const pts = [];
      for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 180 * (60 * i - 30);
        pts.push(`${cx + size * Math.cos(angle)},${cy + size * Math.sin(angle)}`);
      }
      return pts.join(' ');
    }

    function knightTargets(a, b) {
      const c = -(a + b);
      const triple = [a, b, c];
      const permIdx = [[0,1,2],[0,2,1],[1,0,2],[1,2,0],[2,0,1],[2,1,0]];
      const set = new Set();
      for (const sign of [1, -1]) {
        for (const [i, j, k] of permIdx) {
          const x = sign * triple[i];
          const y = sign * triple[j];
          const z = sign * triple[k];
          if (x === 0 && y === 0 && z === 0) continue;
          set.add(`${x},${z}`);
        }
      }
      return Array.from(set).map(s => s.split(',').map(Number));
    }

    function buildMiniSvg(a, b) {
      const svgEl = document.createElementNS(SVG_NS, 'svg');
      svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      const n = 8;
      const targets = knightTargets(a, b);
      const knightSet = new Set(targets.map(([q, r]) => `${q},${r}`));
      const sz = 10;
      const xs = [], ys = [];
      for (let q = -n; q <= n; q++) {
        for (let r = -n; r <= n; r++) {
          if (Math.abs(q + r) > n) continue;
          const x = sz * Math.sqrt(3) * (q + r / 2);
          const y = sz * 1.5 * r;
          xs.push(x); ys.push(y);
          const poly = document.createElementNS(SVG_NS, 'polygon');
          poly.setAttribute('points', hexPoints(x, y, sz));
          const key = `${q},${r}`;
          if (key === '0,0') poly.setAttribute('class', 'center');
          else if (knightSet.has(key)) poly.setAttribute('class', 'knight');
          svgEl.appendChild(poly);
        }
      }
      const dot = document.createElementNS(SVG_NS, 'circle');
      dot.setAttribute('cx', 0);
      dot.setAttribute('cy', 0);
      dot.setAttribute('r', sz * 0.5);
      dot.setAttribute('class', 'marker');
      svgEl.appendChild(dot);
      const minX = Math.min(...xs) - sz;
      const minY = Math.min(...ys) - sz;
      const w = Math.max(...xs) - minX + sz;
      const h = Math.max(...ys) - minY + sz;
      svgEl.setAttribute('viewBox', `${minX} ${minY} ${w} ${h}`);
      return svgEl;
    }

    function generateMoves(count) {
      const seen = new Set();
      const moves = [];
      let safety = 500;
      while (moves.length < count && safety-- > 0) {
        const a = 1 + Math.floor(Math.random() * 4);
        const b = 1 + Math.floor(Math.random() * 4);
        const key = [Math.min(a, b), Math.max(a, b)].join(',');
        if (seen.has(key)) continue;
        seen.add(key);
        moves.push({ a, b });
      }
      return moves;
    }

    // ---- Board geometry ----
    // Hexagonal board (doubled coords). 21 rows, side N=11 hex (radius 10)
    // centered at (row 11, col 7).
    // Valid cells: (row+col) odd AND hex distance from center ≤ 10.
    const ROWS = 21;
    const HEX_CENTER_ROW = 11;
    const HEX_CENTER_COL = 7;
    const HEX_RADIUS = 10;
    const COL_MIN = HEX_CENTER_COL - 2 * HEX_RADIUS;
    const COL_MAX = HEX_CENTER_COL + 2 * HEX_RADIUS;
    const HEX_SIZE = 12;
    const P1_STARTS = [[2,-1],[2,3],[2,7],[2,11],[2,15]];
    const P2_STARTS = [[20,-1],[20,3],[20,7],[20,11],[20,15]];

    function isValidCell(row, col) {
      if ((row + col) % 2 === 0) return false;
      const dr = row - HEX_CENTER_ROW;
      const dc = col - HEX_CENTER_COL;
      return Math.max(Math.abs(dr), (Math.abs(dr) + Math.abs(dc)) / 2) <= HEX_RADIUS;
    }

    function cellToPixel(row, col) {
      return {
        x: col * HEX_SIZE * Math.sqrt(3) / 2,
        y: row * HEX_SIZE * 1.5,
      };
    }

    function isStartingPosition(row, col, player) {
      const list = player === 1 ? P1_STARTS : P2_STARTS;
      return list.some(([r, c]) => r === row && c === col);
    }

    const boardSvg = document.getElementById('board');
    {
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (let r = 1; r <= ROWS; r++) {
        for (let c = COL_MIN; c <= COL_MAX; c++) {
          if (!isValidCell(r, c)) continue;
          const { x, y } = cellToPixel(r, c);
          minX = Math.min(minX, x - HEX_SIZE);
          maxX = Math.max(maxX, x + HEX_SIZE);
          minY = Math.min(minY, y - HEX_SIZE);
          maxY = Math.max(maxY, y + HEX_SIZE);
        }
      }
      boardSvg.setAttribute('viewBox', `${minX} ${minY} ${maxX - minX} ${maxY - minY}`);
    }

    // ---- Draft state ----
    // Turn sizes: P1=1, P2=2, then alternating 1s. Players: 1,2,1,2,1,2,1,2,1.
    const TOTAL = 10;
    let phase = 'drafting'; // 'drafting' | 'placing' | 'done'
    let turnIndex = 0;
    let currentPlayer = 1;
    let picksLeft = 1;
    let pickedCount = 0;
    let pendingKnight = null; // { a, b, player, card }
    const tally = { 1: 0, 2: 0 };
    const placements = []; // { a, b, player, row, col }
    const usedStarts = new Set();

    function updateStatus() {
      document.body.dataset.phase = phase;
    }

    function renderBoard() {
      boardSvg.innerHTML = '';

      for (let r = 1; r <= ROWS; r++) {
        for (let c = COL_MIN; c <= COL_MAX; c++) {
          if (!isValidCell(r, c)) continue;
          const { x, y } = cellToPixel(r, c);
          const poly = document.createElementNS(SVG_NS, 'polygon');
          poly.setAttribute('points', hexPoints(x, y, HEX_SIZE));
          const classes = ['cell'];
          if (phase === 'placing' && pendingKnight
              && isStartingPosition(r, c, pendingKnight.player)
              && !usedStarts.has(`${r},${c}`)) {
            classes.push('available', `p${pendingKnight.player}-target`);
            poly.addEventListener('click', () => onCellClick(r, c));
          }
          poly.setAttribute('class', classes.join(' '));
          boardSvg.appendChild(poly);
        }
      }

      for (const p of placements) {
        const { x, y } = cellToPixel(p.row, p.col);
        const circle = document.createElementNS(SVG_NS, 'circle');
        circle.setAttribute('cx', x);
        circle.setAttribute('cy', y);
        circle.setAttribute('r', HEX_SIZE * 0.7);
        circle.setAttribute('class', `placement-marker p${p.player}`);
        boardSvg.appendChild(circle);

        const text = document.createElementNS(SVG_NS, 'text');
        text.setAttribute('x', x);
        text.setAttribute('y', y);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'central');
        text.setAttribute('font-size', HEX_SIZE * 0.5);
        text.setAttribute('class', 'placement-label');
        text.textContent = `${p.a},${p.b}`;
        boardSvg.appendChild(text);
      }
    }

    function onCardClick(card, m) {
      if (phase !== 'drafting') return;
      if (card.classList.contains('p1') || card.classList.contains('p2')) return;

      card.classList.add(`p${currentPlayer}`);
      pendingKnight = { a: m.a, b: m.b, player: currentPlayer, card };
      phase = 'placing';
      updateStatus();
      renderBoard();
    }

    function onCellClick(row, col) {
      if (phase !== 'placing' || !pendingKnight) return;
      if (!isStartingPosition(row, col, pendingKnight.player)) return;
      if (usedStarts.has(`${row},${col}`)) return;

      placements.push({
        a: pendingKnight.a,
        b: pendingKnight.b,
        player: pendingKnight.player,
        row, col,
      });
      usedStarts.add(`${row},${col}`);
      tally[pendingKnight.player]++;
      pickedCount++;
      picksLeft--;
      pendingKnight = null;

      if (pickedCount >= TOTAL) {
        phase = 'done';
      } else if (picksLeft > 0) {
        phase = 'drafting';
      } else {
        turnIndex++;
        currentPlayer = currentPlayer === 1 ? 2 : 1;
        picksLeft = turnIndex === 1 ? 2 : 1;
        phase = 'drafting';
      }

      updateStatus();
      renderBoard();
    }

    // ---- Init ----
    const cardsEl = document.getElementById('cards');
    const moves = generateMoves(TOTAL);

    moves.forEach(m => {
      const card = document.createElement('div');
      card.className = 'card';
      card.appendChild(buildMiniSvg(m.a, m.b));
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = `a=${m.a}, b=${m.b}`;
      card.appendChild(label);
      card.addEventListener('click', () => onCardClick(card, m));
      cardsEl.appendChild(card);
    });

    updateStatus();
    renderBoard();
  </script>
</body>
</html>
