<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fork.Web</title>
  <style>
    :root {
      --p1: #3af;
      --p1-bg: #16263a;
      --p1-fill: #1d3a52;
      --p2: #f54;
      --p2-bg: #3a1a16;
      --p2-fill: #52201d;
      --done: #4c4;
    }
    body {
      margin: 0;
      background: #111;
      color: #ddd;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      gap: 16px;
      box-sizing: border-box;
    }
    .status {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-radius: 8px;
      background: #1a1a22;
      border: 2px solid var(--p1);
      font-weight: 600;
      font-size: 16px;
      width: 100%;
      max-width: 480px;
      box-sizing: border-box;
      justify-content: center;
    }
    .status.p2 { border-color: var(--p2); }
    .status.done { border-color: var(--done); }

    /* Cards (drafting view) */
    .move-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(5, auto);
      gap: 12px;
      width: 100%;
      max-width: 480px;
    }
    body[data-phase="placing"] .move-cards,
    body[data-phase="playing"] .move-cards,
    body[data-phase="done"] .move-cards { display: none; }

    .card {
      background: #1a1a22;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      user-select: none;
      aspect-ratio: 1 / 1.15;
      transition: border-color 0.15s, background 0.15s;
    }
    .card:not(.p1):not(.p2):hover { border-color: #6cf; }
    .card.p1 {
      border-color: var(--p1);
      background: var(--p1-bg);
      cursor: default;
    }
    .card.p2 {
      border-color: var(--p2);
      background: var(--p2-bg);
      cursor: default;
    }
    .card.p1 polygon.knight { fill: var(--p1-fill); stroke: var(--p1); }
    .card.p2 polygon.knight { fill: var(--p2-fill); stroke: var(--p2); }
    .card.p1 polygon.center { fill: var(--p1-bg); stroke: var(--p1); }
    .card.p2 polygon.center { fill: var(--p2-bg); stroke: var(--p2); }
    .card.p1 circle.marker { fill: var(--p1); stroke: #cef; }
    .card.p2 circle.marker { fill: var(--p2); stroke: #fce; }
    .card svg {
      width: 100%;
      flex: 1;
      min-height: 0;
      display: block;
    }

    /* Board view */
    .board-wrap {
      display: none;
      width: 70%;
    }
    body[data-phase="placing"] .board-wrap,
    body[data-phase="playing"] .board-wrap,
    body[data-phase="done"] .board-wrap { display: block; }
    #board {
      width: 100%;
      height: auto;
      display: block;
    }
    .cell {
      fill: #1a1a22;
      stroke: #333;
      stroke-width: 0.3;
    }
    .cell.available.p1-target {
      fill: var(--p1-bg);
      stroke: var(--p1);
      stroke-width: 0.8;
      cursor: pointer;
    }
    .cell.available.p2-target {
      fill: var(--p2-bg);
      stroke: var(--p2);
      stroke-width: 0.8;
      cursor: pointer;
    }
    .cell.available:hover { filter: brightness(1.4); }
    .placement-marker { stroke-width: 0.8; }
    .placement-marker.p1 { fill: var(--p1); stroke: #cef; }
    .placement-marker.p2 { fill: var(--p2); stroke: #fce; }
    .placement-marker.selectable { cursor: pointer; }
    .placement-marker.selectable:hover { filter: brightness(1.2); }
    .placement-marker.selected { stroke: white; stroke-width: 1.5; }
    .placement-label {
      fill: white;
      font-family: system-ui, sans-serif;
      font-weight: 600;
      pointer-events: none;
    }

    /* Card mini-svg cell styling */
    polygon {
      fill: #1a1a22;
      stroke: #333;
      stroke-width: 0.5;
    }
    polygon.knight {
      fill: #333;
      stroke: #eee;
    }
    polygon.center {
      fill: #1a1a22;
      stroke: #333;
    }
    circle.marker {
      fill: #eee;
      stroke: #fff;
      stroke-width: 1;
    }
    .reach-marker {
      fill: none;
      stroke: none;
      pointer-events: none;
    }
    .reach-marker.p1 { fill: var(--p1-bg); }
    .reach-marker.p2 { fill: var(--p2-bg); }
    .reach-marker.both { fill: #ccc; }
  </style>
</head>
<body data-phase="drafting">
  <div class="status" id="status-bar">
    <div id="status-msg">Player 1</div>
  </div>
  <div class="move-cards" id="cards"></div>
  <div class="board-wrap" id="board-wrap">
    <svg id="board" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <script src="common.js"></script>
  <script src="game.js"></script>
  <script src="draft.js"></script>
</body>
</html>
